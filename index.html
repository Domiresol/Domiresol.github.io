<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫 GitHub Pages</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        p {
            color: #666;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: #ff7b7b;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎉 GitHub Pages 성공!</h1>
    <p>블로그가 정상적으로 배포되었습니다.</p>

    <button onclick="showMessage()">
        클릭해보세요
    </button>
</div>

<script>
    function showMessage() {
        alert("JavaScript도 정상적으로 동작합니다!");
    }
</script>

</body>
</html>
